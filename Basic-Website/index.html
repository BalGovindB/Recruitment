<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card">
    <header class="card__header">
      <h1 class="wordmark">Todo<span class="wordmark__dot">.</span></h1>
      <p class="tagline">A short list, kept honest.</p>
    </header>

    <form id="add-form" class="add-form" autocomplete="off">
      <input
        type="text"
        id="task-input"
        class="add-form__input"
        placeholder="Add a task…"
        maxlength="120"
        aria-label="New task"
      >
      <button type="submit" class="add-form__button">Add</button>
    </form>

    <div class="toolbar">
      <div class="filters" role="tablist" aria-label="Filter tasks">
        <button class="filter is-active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button class="filter" data-filter="active" role="tab" aria-selected="false">Active</button>
        <button class="filter" data-filter="completed" role="tab" aria-selected="false">Completed</button>
      </div>
      <span id="task-count" class="count">0 remaining</span>
    </div>

    <ul id="task-list" class="task-list"></ul>

    <p id="empty-state" class="empty-state">Nothing here yet — add your first task above.</p>
  </main>

  <footer class="footer">Built for the ACM recruitment task · data lives in memory only</footer>

<script src="script.js"></script>
</body>
</html>
